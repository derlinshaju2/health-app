<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minimal Test</title>
</head>
<body>
    <h1>JavaScript Test</h1>
    <p>If you can see this page, HTML is working.</p>

    <button onclick="alert('Button clicked!')">Click Me - Alert Test</button><br><br>

    <button onclick="document.getElementById('demo').innerHTML = 'Button worked!'">Click Me - Text Change</button><br><br>

    <div id="demo" style="padding: 20px; background: yellow; margin: 20px 0;">
        Text will appear here when button works
    </div>

    <script>
        // This should run immediately when page loads
        document.body.style.background = "lightblue";
        console.log("JavaScript is working!");
        alert("If you see this alert, JavaScript IS working!");

        // Test if we can modify DOM
        window.onload = function() {
            document.getElementById('demo').innerHTML = "Page loaded! JavaScript is working!";
            console.log("Window.onload fired!");
        };
    </script>
</body>
</html>
