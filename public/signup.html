<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HealthAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --success: #10b981;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #e2e8f0;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .signup-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 15px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 30px;
    }

    .welcome-text h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .welcome-text p {
      font-size: 14px;
      color: var(--gray);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .form-group {
      flex: 1;
    }

    .signup-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .signup-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--gray);
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
      color: #991b1b;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .signup-container {
        padding: 30px 20px;
      }

      .name-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <div class="logo-text">HealthAI</div>
    </div>

    <!-- Welcome Text -->
    <div class="welcome-text">
      <h1>Create Account</h1>
      <p>Sign up to start your health journey</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Signup Form -->
    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="name-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            placeholder="John"
            required
            autocomplete="given-name"
          >
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            placeholder="Doe"
            required
            autocomplete="family-name"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="john.doe@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Create a password"
          required
          autocomplete="new-password"
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm your password"
          required
          autocomplete="new-password"
        >
      </div>

      <button type="submit" class="signup-btn" id="signupBtn">
        Create Account
      </button>
    </form>

    <!-- Login Link -->
    <div class="login-link">
      Already have an account? <a href="index.html">Sign in</a>
    </div>
  </div>

  <script>
    // Handle signup form submission
    async function handleSignup(event) {
      event.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const signupBtn = document.getElementById('signupBtn');
      const errorMessage = document.getElementById('errorMessage');

      // Basic validation
      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        showError('Please fill in all fields');
        return;
      }

      if (!isValidEmail(email)) {
        showError('Please enter a valid email address');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      // Show loading state
      signupBtn.disabled = true;
      signupBtn.innerHTML = '<div class="spinner"></div>';

      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Get registered users from localStorage
        const users = JSON.parse(localStorage.getItem('healthAIUsers') || '[]');

        // Check if user already exists
        const existingUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());
        if (existingUser) {
          showError('An account with this email already exists');
          signupBtn.disabled = false;
          signupBtn.innerHTML = 'Create Account';
          return;
        }

        // Create new user
        const newUser = {
          id: 'user_' + Date.now(),
          firstName: firstName,
          lastName: lastName,
          email: email,
          password: password,
          createdAt: new Date().toISOString(),
          lastLogin: null
        };

        // Save user
        users.push(newUser);
        localStorage.setItem('healthAIUsers', JSON.stringify(users));
        console.log('New user created and saved:', newUser);
        console.log('All users after signup:', JSON.parse(localStorage.getItem('healthAIUsers')));

        // Auto-login after signup
        const userSession = {
          id: newUser.id,
          email: newUser.email,
          firstName: newUser.firstName,
          lastName: newUser.lastName,
          isAuthenticated: true,
          loginTime: new Date().toISOString()
        };

        localStorage.setItem('healthAIUser', JSON.stringify(userSession));

        // Show success and redirect
        signupBtn.innerHTML = '✓ Account Created!';
        signupBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';

        setTimeout(() => {
          window.location.href = 'dashboard-main.html';
        }, 1500);

      } catch (error) {
        console.error('Signup error:', error);
        showError('An error occurred. Please try again.');
        signupBtn.disabled = false;
        signupBtn.innerHTML = 'Create Account';
      }
    }

    // Show error message
    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.classList.add('show');

      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 4000);
    }

    // Validate email format
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }
  </script>
</body>
</html>
