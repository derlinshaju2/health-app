<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Health App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .signup-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: #667eea; font-size: 28px; }
    .logo p { color: #666; font-size: 14px; }
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .signup-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .signup-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .status-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    .status-message.error {
      background: #fee;
      color: #c33;
      display: block;
    }
    .status-message.success {
      background: #efe;
      color: #3c3;
      display: block;
    }
    .status-message.loading {
      background: #eef;
      color: #667eea;
      display: block;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="logo">
      <h1>🏥 Health App</h1>
      <p>Create your account</p>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required placeholder="Your full name" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Min 6 characters" autocomplete="new-password" minlength="6">
      </div>

      <button type="submit" class="signup-btn" id="signupBtn">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="instant-login.html">Sign in</a>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const signupBtn = document.getElementById('signupBtn');
    const statusMessage = document.getElementById('statusMessage');

    function showStatus(message, type) {
      statusMessage.className = 'status-message ' + type;
      statusMessage.textContent = message;
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Instant UI feedback
      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating account...';
      showStatus('Setting up your account...', 'loading');

      try {
        // Fast API call with 5 second timeout
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const response = await fetch('https://health-app-orpin-three.vercel.app/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, profile: { name } }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (response.ok) {
          const data = await response.json();
          if (data.status === 'success') {
            // Store credentials instantly
            localStorage.setItem('token', data.data.token);
            localStorage.setItem('user', JSON.stringify(data.data.user));

            showStatus('✓ Account created! Loading your dashboard...', 'success');

            // Instant redirect
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 500);
          } else {
            throw new Error(data.message);
          }
        } else {
          throw new Error('Signup failed');
        }

      } catch (error) {
        console.error('Signup error:', error);
        showStatus('❌ ' + (error.message || 'Connection failed. Please try again.'), 'error');
        signupBtn.disabled = false;
        signupBtn.textContent = 'Create Account';
      }
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      showStatus('✓ Already logged in! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }

    // Page loads instantly
    console.log('✓ Signup page loaded instantly!');
  </script>
</body>
</html>
