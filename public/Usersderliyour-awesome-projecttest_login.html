<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 5px; margin: 10px 0; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test</h1>
        <p>Test if login buttons work</p>

        <div id="testSection">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">

            <button onclick="window.testLogin()">🚀 Test Login</button>
            <button onclick="window.testRegister()" style="background: #6c757d;">➕ Test Register</button>
            <button onclick="window.testAlert()" style="background: #28a745;">🧪 Test Alert</button>

            <div id="result" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        // API configuration
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : '';

        console.log('Test page loaded');
        console.log('API_BASE:', API_BASE);

        window.testAlert = function() {
            alert('✅ JavaScript is working! Buttons are clickable!');
            showResult('✅ Test passed! JavaScript is working.', true);
        };

        window.testLogin = async function() {
            console.log('Login button clicked!');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showResult('❌ Please fill in email and password', false);
                return;
            }

            showResult('⏳ Testing login...', false);

            try {
                const apiUrl = API_BASE + '/api/auth/login';
                console.log('Calling:', apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Response:', data);

                if (data.status === 'success') {
                    showResult('✅ Login API is working! Token: ' + data.data.token.substring(0, 20) + '...', true);
                } else {
                    showResult('⚠️ Login API responded: ' + data.message, false);
                }
            } catch (error) {
                showResult('❌ Login API error: ' + error.message, false);
            }
        };

        window.testRegister = async function() {
            console.log('Register button clicked!');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showResult('❌ Please fill in email and password', false);
                return;
            }

            showResult('⏳ Testing registration...', false);

            try {
                const apiUrl = API_BASE + '/api/auth/register';
                console.log('Calling:', apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        profile: { name: 'Test User' }
                    })
                });

                const data = await response.json();
                console.log('Response:', data);

                if (data.status === 'success') {
                    showResult('✅ Registration API is working!', true);
                } else {
                    showResult('⚠️ Registration API responded: ' + data.message, false);
                }
            } catch (error) {
                showResult('❌ Registration API error: ' + error.message, false);
            }
        };

        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
            resultDiv.innerHTML = message;
        }
    </script>
</body>
</html>
