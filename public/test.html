<!DOCTYPE html>
<html>
<head>
    <title>API Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .test-section { margin: 30px 0; padding: 20px; background: #f9f9f9; border-radius: 8px; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #667eea; color: white; }
        .result { margin: 15px 0; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .env-info { background: #e7f3ff; padding: 15px; border-radius: 5px; margin: 20px 0; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 API Diagnostic Tool</h1>
        <p>This will test your application step by step.</p>

        <div class="env-info">
            <h3>📍 Environment:</h3>
            <div id="envInfo"></div>
        </div>

        <div class="test-section">
            <h3>Test 1: API Health Check</h3>
            <button onclick="testHealth()">Test API Health</button>
            <div id="healthResult" class="result"></div>
        </div>

        <div class="test-section">
            <h3>Test 2: Register</h3>
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">
            <input type="text" id="regName" placeholder="Name">
            <button onclick="testRegister()">Test Registration</button>
            <div id="regResult" class="result"></div>
        </div>

        <div class="test-section">
            <h3>Test 3: Login</h3>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="testLogin()">Test Login</button>
            <div id="loginResult" class="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('envInfo').innerHTML = `
            <strong>URL:</strong> ${window.location.href}<br>
            <strong>Health API:</strong> /api/health<br>
            <strong>Register API:</strong> /api/auth/register<br>
            <strong>Login API:</strong> /api/auth/login
        `;

        function showResult(id, msg, type) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            el.className = 'result ' + type;
            el.innerHTML = msg;
        }

        async function testHealth() {
            showResult('healthResult', 'Testing...', 'loading');
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                if (data.status === 'success') {
                    showResult('healthResult', '✅ API is working! Database: ' + (data.database || 'Unknown'), 'success');
                } else {
                    showResult('healthResult', '⚠️ ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showResult('healthResult', '❌ Error: ' + error.message, 'error');
            }
        }

        async function testRegister() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;
            
            if (!email || !password || !name) {
                showResult('regResult', '❌ Fill all fields', 'error');
                return;
            }

            showResult('regResult', 'Testing...', 'loading');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, profile: { name } })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    showResult('regResult', '✅ Registration successful! User: ' + data.data.user.email, 'success');
                    // Auto-fill login
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = password;
                } else {
                    showResult('regResult', '⚠️ ' + data.message, 'error');
                }
            } catch (error) {
                showResult('regResult', '❌ Error: ' + error.message, 'error');
            }
        }

        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showResult('loginResult', '❌ Fill all fields', 'error');
                return;
            }

            showResult('loginResult', 'Testing...', 'loading');
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    showResult('loginResult', '✅ Login successful! Welcome: ' + data.data.user.name, 'success');
                    localStorage.setItem('auth_token', data.data.token);
                } else {
                    showResult('loginResult', '⚠️ ' + data.message, 'error');
                }
            } catch (error) {
                showResult('loginResult', '❌ Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
