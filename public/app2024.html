<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Login</title></head><body style="font-family:Arial;background:#667eea;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="background:white;padding:40px;border-radius:20px;max-width:400px;width:100%"><h1 style="color:#667eea;text-align:center">Health App</h1><div id="login"><input id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box"><input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box"><button onclick="doLogin()" style="width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:5px;cursor:pointer">Login</button><p style="text-align:center"><a onclick="showReg()" style="color:#667eea;cursor:pointer">Register</a></p><div id="msg" style="margin-top:10px;padding:10px;border-radius:5px;display:none"></div></div><div id="register" style="display:none"><input id="name" placeholder="Name" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box"><input id="regEmail" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box"><input id="regPass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box"><button onclick="doReg()" style="width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:5px;cursor:pointer;margin:5px 0">Create Account</button><button onclick="showLogin()" style="width:100%;padding:15px;background:#6c757d;color:white;border:none;border-radius:5px;cursor:pointer">Back</button><div id="regMsg" style="margin-top:10px;padding:10px;border-radius:5px;display:none"></div></div><div id="dash" style="display:none;text-align:center"><h2 style="color:#667eea">Welcome!</h2><p id="user"></p><button onclick="doLogout()" style="width:100%;padding:15px;background:#dc3545;color:white;border:none;border-radius:5px;cursor:pointer">Logout</button></div></div><script>const API="";function show(id){document.getElementById(id).style.display="block"}function hide(id){document.getElementById(id).style.display="none"}function showLogin(){hide("register");hide("dash");show("login")}function showReg(){hide("login");hide("dash");show("register")}function showDash(u){hide("login");hide("register");show("dash");document.getElementById("user").textContent="Email: "+u.email}function msg(id,text,ok){const el=document.getElementById(id);el.style.display="block";el.style.background=ok?"#d4edda":"#f8d7da";el.style.color=ok?"#155724":"#721c24";el.textContent=text}async function doLogin(){const e=document.getElementById("email").value;const p=document.getElementById("pass").value;if(!e||!p){msg("msg","Enter email and password",false);return}msg("msg","Logging in...",false);try{const r=await fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(d.status==="success"){localStorage.setItem("token",d.data.token);msg("msg","Success!",true);setTimeout(()=>showDash(d.data.user),1000)}else{msg("msg",d.message||"Failed",false)}}catch(err){msg("msg","Error: "+err.message,false)}}async function doReg(){const n=document.getElementById("name").value;const e=document.getElementById("regEmail").value;const p=document.getElementById("regPass").value;if(!n||!e||!p){msg("regMsg","Fill all fields",false);return}msg("regMsg","Creating account...",false);try{const r=await fetch(API+"/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p,profile:{name:n}})});const d=await r.json();if(d.status==="success"){localStorage.setItem("token",d.data.token);msg("regMsg","Success!",true);setTimeout(()=>showDash(d.data.user),1000)}else{msg("regMsg",d.message||"Failed",false)}}catch(err){msg("regMsg","Error: "+err.message,false)}}function doLogout(){localStorage.removeItem("token");showLogin()}window.onload=function(){console.log("READY");const t=localStorage.getItem("token");if(t){showDash({email:"User"})}};</script></body></html>
