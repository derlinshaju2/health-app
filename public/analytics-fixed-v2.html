<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Analytics - Fixed Version</title>
  <meta name="cache-buster" content="v6-20260502-canvas-fix">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1; --secondary: #8b5cf6; --accent: #ec4899;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --dark: #1e293b; --light: #f8fafc; --gray: #64748b;
      --border: #e2e8f0; --shadow: rgba(0, 0, 0, 0.08);
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      min-height: 100vh;
      color: var(--dark);
      display: flex;
      padding: 20px;
    }
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .status-box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px var(--shadow);
      text-align: center;
    }
    .status-box.success {
      background: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
    }
    .status-box.error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 12px var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .chart-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--shadow);
    }
    .chart-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }
    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }
    @media (max-width: 768px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
      .chart-container {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="header">
      <h1 class="page-title">📊 Health Analytics Dashboard</h1>
      <p>Fixed version with working charts</p>
    </div>

    <div id="status" class="status-box">
      <strong>🔄 Loading Charts...</strong>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">🎯 Health Score</div>
        <div class="chart-container">
          <canvas id="healthScoreChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">⚖️ Weight Trends</div>
        <div class="chart-container">
          <canvas id="weightChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">🔥 Calorie Trends</div>
        <div class="chart-container">
          <canvas id="calorieChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">😴 Sleep Trends</div>
        <div class="chart-container">
          <canvas id="sleepChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">🏋️ Workout Frequency</div>
        <div class="chart-container">
          <canvas id="workoutChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Global flag to prevent multiple initializations
    let chartsInitialized = false;
    let charts = {};

    function updateStatus(message, isError = false) {
      const statusEl = document.getElementById('status');
      if (statusEl) {
        statusEl.innerHTML = message;
        statusEl.className = isError ? 'status-box error' : 'status-box success';
      }
      console.log(message);
    }

    function createCharts() {
      if (chartsInitialized) {
        console.log('Charts already initialized, skipping...');
        return;
      }

      if (typeof Chart === 'undefined') {
        updateStatus('❌ Chart.js not loaded. Please refresh the page.', true);
        return;
      }

      try {
        updateStatus('🔄 Creating charts...');

        // Health Score Chart
        const healthCtx = document.getElementById('healthScoreChart').getContext('2d');
        charts.healthScore = new Chart(healthCtx, {
          type: 'line',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
              label: 'Health Score',
              data: [82, 84, 83, 85, 86, 84, 85],
              borderColor: '#6366f1',
              backgroundColor: 'rgba(99, 102, 241, 0.1)',
              fill: true,
              tension: 0.4
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        // Weight Chart
        const weightCtx = document.getElementById('weightChart').getContext('2d');
        charts.weight = new Chart(weightCtx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
              label: 'Weight (kg)',
              data: [75, 74.5, 74, 73.2, 72.8, 72.5],
              borderColor: '#f59e0b',
              backgroundColor: 'rgba(245, 158, 11, 0.1)',
              fill: true,
              tension: 0.4
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        // Calorie Chart
        const calorieCtx = document.getElementById('calorieChart').getContext('2d');
        charts.calorie = new Chart(calorieCtx, {
          type: 'bar',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
              label: 'Calories',
              data: [1850, 2100, 1920, 2050, 1880, 2200, 1950],
              backgroundColor: [
                'rgba(99, 102, 241, 0.8)', 'rgba(139, 92, 246, 0.8)',
                'rgba(236, 72, 153, 0.8)', 'rgba(245, 158, 11, 0.8)',
                'rgba(16, 185, 129, 0.8)', 'rgba(59, 130, 246, 0.8)',
                'rgba(239, 68, 68, 0.8)'
              ]
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        // Sleep Chart
        const sleepCtx = document.getElementById('sleepChart').getContext('2d');
        charts.sleep = new Chart(sleepCtx, {
          type: 'line',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
              label: 'Sleep Hours',
              data: [7.2, 6.8, 7.5, 8.0, 7.1, 7.8, 8.2],
              borderColor: '#8b5cf6',
              backgroundColor: 'rgba(139, 92, 246, 0.1)',
              fill: true,
              tension: 0.4
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        // Workout Chart
        const workoutCtx = document.getElementById('workoutChart').getContext('2d');
        charts.workout = new Chart(workoutCtx, {
          type: 'doughnut',
          data: {
            labels: ['Cardio', 'Strength', 'Yoga', 'HIIT', 'Rest'],
            datasets: [{
              data: [3, 2, 4, 2, 1],
              backgroundColor: [
                'rgba(99, 102, 241, 0.8)', 'rgba(139, 92, 246, 0.8)',
                'rgba(16, 185, 129, 0.8)', 'rgba(245, 158, 11, 0.8)',
                'rgba(203, 213, 225, 0.8)'
              ]
            }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        chartsInitialized = true;
        updateStatus('✅ <strong>Success!</strong> All 5 charts loaded perfectly!');

      } catch (error) {
        updateStatus('❌ <strong>Error:</strong> ' + error.message, true);
        console.error('Chart creation error:', error);
      }
    }

    // Single initialization when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', createCharts);
    } else {
      createCharts();
    }

    // Prevent any other initialization attempts
    window.addEventListener('load', function() {
      if (chartsInitialized) {
        console.log('Charts already initialized, preventing duplicate initialization');
      }
    });
  </script>
</body>
</html>
