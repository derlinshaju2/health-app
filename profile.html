<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Health App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --success: #10b981;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--dark);
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .profile-section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 36px;
      font-weight: 700;
      margin: 0 auto 16px;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .profile-email {
      color: var(--gray);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      text-decoration: none;
      color: var(--dark);
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .stat-item {
      background: var(--light);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-btn">
      ← Back to Dashboard
    </a>

    <div class="header" style="margin-top: 20px;">
      <h1>👤 My Profile</h1>
      <p style="color: var(--gray); font-size: 14px; margin-top: 8px;">Manage your account settings and preferences</p>
    </div>

    <div class="profile-section">
      <div class="profile-header">
        <div class="avatar">U</div>
        <h2 class="profile-name">User Name</h2>
        <p class="profile-email">user@example.com</p>
      </div>

      <form id="profileForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-input" value="User Name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" value="user@example.com" placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="age">Age</label>
          <input type="number" id="age" class="form-input" value="30" placeholder="Your age">
        </div>

        <div class="form-group">
          <label class="form-label" for="weight">Current Weight (kg)</label>
          <input type="number" id="weight" class="form-input" value="72.5" step="0.1" placeholder="Your weight">
        </div>

        <div class="form-group">
          <label class="form-label" for="height">Height (cm)</label>
          <input type="number" id="height" class="form-input" value="175" placeholder="Your height">
        </div>

        <button type="submit" class="save-btn">💾 Save Profile</button>
      </form>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">7</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">22.4</div>
          <div class="stat-label">BMI</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">156</div>
          <div class="stat-label">Days Active</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Profile saved successfully!');
    });
  </script>
</body>
</html>
