<!DOCTYPE html>
<html>
<head>
    <title>AI Health App - Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #4CAF50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #45a049; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .health-form { margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 5px; display: none; }
        pre { background: white; padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 12px; }
        .token-info { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 AI Health App Login Test</h1>

        <div id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" value="testuser@example.com" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" value="test123" placeholder="Enter your password">
            </div>
            <button onclick="login()">Login to Health App</button>
        </div>

        <div id="result" class="result"></div>

        <div id="healthForm" class="health-form">
            <h3>Add Health Metrics</h3>
            <div class="form-group">
                <label for="systolic">Blood Pressure (Systolic):</label>
                <input type="number" id="systolic" value="120" placeholder="120">
            </div>
            <div class="form-group">
                <label for="diastolic">Blood Pressure (Diastolic):</label>
                <input type="number" id="diastolic" value="80" placeholder="80">
            </div>
            <div class="form-group">
                <label for="bloodSugar">Blood Sugar (mg/dL):</label>
                <input type="number" id="bloodSugar" value="95" placeholder="95">
            </div>
            <div class="form-group">
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" value="75" placeholder="75">
            </div>
            <button onclick="addHealthMetrics()">Add Health Metrics</button>
        </div>
    </div>

    <script>
        let authToken = null;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<p>⏳ Logging in...</p>';

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    authToken = data.data.token;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Login Successful!</h3>
                        <p><strong>Welcome:</strong> ${data.data.user.email}</p>
                        <p><strong>Name:</strong> ${data.data.user.profile.name || 'User'}</p>
                        <div class="token-info">
                            <p><strong>Token:</strong> ${authToken.substring(0, 30)}...</p>
                            <button onclick="showHealthForm()" style="margin-top: 10px; padding: 10px;">Add Health Metrics</button>
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Login Failed!</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Check your browser console (F12) for more details.</p>
                `;
            }
        }

        function showHealthForm() {
            document.getElementById('healthForm').style.display = 'block';
        }

        async function addHealthMetrics() {
            const systolic = document.getElementById('systolic').value;
            const diastolic = document.getElementById('diastolic').value;
            const bloodSugar = document.getElementById('bloodSugar').value;
            const weight = document.getElementById('weight').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<p>⏳ Adding health metrics...</p>';

            try {
                const response = await fetch('http://localhost:5000/api/health/metrics', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        date: new Date().toISOString(),
                        metrics: {
                            bloodPressure: {
                                systolic: parseInt(systolic),
                                diastolic: parseInt(diastolic)
                            },
                            bloodSugar: parseInt(bloodSugar),
                            weight: parseFloat(weight)
                        }
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Health Metrics Added!</h3>
                        <p><strong>Date:</strong> ${new Date().toLocaleString()}</p>
                        <p><strong>Metrics:</strong></p>
                        <ul>
                            <li>Blood Pressure: ${systolic}/${diastolic}</li>
                            <li>Blood Sugar: ${bloodSugar} mg/dL</li>
                            <li>Weight: ${weight} kg</li>
                        </ul>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <button onclick="location.reload()" style="margin-top: 10px; padding: 10px;">Add More Metrics</button>
                    `;
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Failed to Add Metrics!</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
