<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clean Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px
        }
        .form-group {
            margin-bottom: 15px
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0
        }
        button.secondary {
            background: #6c757d
        }
        .hidden {
            display: none
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none
        }
        .success {
            background: #d4edda;
            color: #155724
        }
        .error {
            background: #f8d7da;
            color: #721c24
        }
        a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Health App</h1>

        <div id="loginForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="login()">Login</button>
            <p style="text-align: center; margin-top: 15px">
                No account? <a onclick="showRegister()">Register here</a>
            </p>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" placeholder="Enter name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="regEmail" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="regPassword" placeholder="Create password">
            </div>
            <button onclick="register()">Create Account</button>
            <button class="secondary" onclick="showLogin()">Back to Login</button>
            <div id="registerMessage" class="message"></div>
        </div>

        <div id="dashboard" class="hidden">
            <h2>Welcome!</h2>
            <p id="userInfo"></p>
            <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin: 20px 0">
                <p>You are successfully logged in!</p>
            </div>
            <button onclick="logout()" style="background: #dc3545">Logout</button>
        </div>
    </div>

    <script>
    // Global variables
    var API_BASE = "";
    var authToken = null;

    // Utility function
    function showMessage(elementId, text, isSuccess) {
        var element = document.getElementById(elementId);
        element.style.display = "block";
        element.className = isSuccess ? "message success" : "message error";
        element.textContent = text;
    }

    // Show/hide forms
    function showLogin() {
        document.getElementById("loginForm").classList.remove("hidden");
        document.getElementById("registerForm").classList.add("hidden");
        document.getElementById("dashboard").classList.add("hidden");
    }

    function showRegister() {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("registerForm").classList.remove("hidden");
        document.getElementById("dashboard").classList.add("hidden");
    }

    function showDashboard(user) {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("registerForm").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("userInfo").textContent = "Email: " + user.email;
    }

    // Login function
    async function login() {
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;

        if (!email || !password) {
            showMessage("loginMessage", "Please enter email and password", false);
            return;
        }

        showMessage("loginMessage", "Logging in...", false);

        try {
            var response = await fetch(API_BASE + "/api/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email: email, password: password})
            });

            var data = await response.json();

            if (data.status === "success") {
                authToken = data.data.token;
                localStorage.setItem("auth_token", authToken);
                showMessage("loginMessage", "Login successful!", true);
                setTimeout(function() {
                    showDashboard(data.data.user);
                }, 1000);
            } else {
                showMessage("loginMessage", data.message || "Login failed", false);
            }
        } catch (error) {
            showMessage("loginMessage", "Error: " + error.message, false);
        }
    }

    // Register function
    async function register() {
        var name = document.getElementById("name").value;
        var email = document.getElementById("regEmail").value;
        var password = document.getElementById("regPassword").value;

        if (!name || !email || !password) {
            showMessage("registerMessage", "Please fill all fields", false);
            return;
        }

        showMessage("registerMessage", "Creating account...", false);

        try {
            var response = await fetch(API_BASE + "/api/auth/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    email: email,
                    password: password,
                    profile: {name: name}
                })
            });

            var data = await response.json();

            if (data.status === "success") {
                authToken = data.data.token;
                localStorage.setItem("auth_token", authToken);
                showMessage("registerMessage", "Account created!", true);
                setTimeout(function() {
                    showDashboard(data.data.user);
                }, 1000);
            } else {
                showMessage("registerMessage", data.message || "Registration failed", false);
            }
        } catch (error) {
            showMessage("registerMessage", "Error: " + error.message, false);
        }
    }

    // Logout function
    function logout() {
        localStorage.removeItem("auth_token");
        authToken = null;
        showLogin();
    }

    // Initialize on page load
    window.onload = function() {
        console.log("Page loaded successfully");

        var savedToken = localStorage.getItem("auth_token");
        if (savedToken) {
            authToken = savedToken;
            showDashboard({email: "User"});
        }
    };
    </script>
</body>
</html>
