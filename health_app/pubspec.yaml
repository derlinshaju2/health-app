name: health_app
description: AI-Driven Health Monitoring Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.1.2
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Charts & Analytics
  fl_chart: ^0.65.0

  # Authentication
  jwt_decoder: ^2.0.1

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.1
  image_picker: ^1.0.5
  permission_handler: ^11.1.0

  # UI Components
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Notifications
  flutter_local_notifications: ^16.3.0
  # firebase_messaging: ^14.7.10  # Disabled due to web compatibility issues

  # Health & Fitness
  health: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
