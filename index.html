<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HealthAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --success: #10b981;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #e2e8f0;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 15px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 30px;
    }

    .welcome-text h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .welcome-text p {
      font-size: 14px;
      color: var(--gray);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .signup-link {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: var(--gray);
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
      color: #991b1b;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <div class="logo-text">HealthAI</div>
    </div>

    <!-- Welcome Text -->
    <div class="welcome-text">
      <h1>Welcome Back!</h1>
      <p>Sign in to access your health dashboard</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Sign In
      </button>
    </form>

    <!-- Signup Link -->
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script>
    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');

      // Basic validation
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      if (!isValidEmail(email)) {
        showError('Please enter a valid email address');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<div class="spinner"></div>';

      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Get registered users from localStorage
        const users = JSON.parse(localStorage.getItem('healthAIUsers') || '[]');
        console.log('All registered users:', users);
        console.log('Looking for email:', email);

        // Find user with matching email
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
        console.log('Found user:', user);

        if (!user) {
          showError('No account found with this email. Please sign up first.');
          loginBtn.disabled = false;
          loginBtn.innerHTML = 'Sign In';
          return;
        }

        // Check password
        if (user.password !== password) {
          showError('Incorrect password');
          loginBtn.disabled = false;
          loginBtn.innerHTML = 'Sign In';
          return;
        }

        // Create user session
        const userSession = {
          id: user.id,
          email: user.email,
          firstName: user.firstName,
          lastName: user.lastName,
          isAuthenticated: true,
          loginTime: new Date().toISOString()
        };

        console.log('Creating user session:', userSession);

        // Store user session
        localStorage.setItem('healthAIUser', JSON.stringify(userSession));
        console.log('User session stored in localStorage');

        // Update last login
        user.lastLogin = new Date().toISOString();
        localStorage.setItem('healthAIUsers', JSON.stringify(users));

        // Show success and redirect
        loginBtn.innerHTML = '✓ Success!';
        loginBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';

        setTimeout(() => {
          // Check if user has completed onboarding
          const userProfile = localStorage.getItem('userProfile');

          if (!userProfile) {
            // New user - redirect to onboarding
            window.location.href = 'onboarding.html';
          } else {
            // Returning user - redirect to dashboard
            window.location.href = 'dashboard.html';
          }
        }, 1000);

      } catch (error) {
        console.error('Login error:', error);
        showError('An error occurred. Please try again.');
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign In';
      }
    }

    // Show error message
    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.classList.add('show');

      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 4000);
    }

    // Validate email format
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    // Create demo account if it doesn't exist
    (function() {
      const users = JSON.parse(localStorage.getItem('healthAIUsers') || '[]');
      const demoExists = users.find(u => u.email === 'john.doe@example.com');
      if (!demoExists) {
        users.push({
          id: 'demo_user_001',
          firstName: 'John',
          lastName: 'Doe',
          email: 'john.doe@example.com',
          password: 'password123',
          createdAt: new Date().toISOString()
        });
        localStorage.setItem('healthAIUsers', JSON.stringify(users));
      }
    })();

    // Demo credentials in console
    console.log('Demo: john.doe@example.com / password123');
  </script>
</body>
</html>
