<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HealthAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #e2e8f0;
      --shadow: rgba(0, 0, 0, 0.08);
      --shadow-lg: rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      min-height: 100vh;
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Container */
    .auth-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 32px;
      padding: 48px;
      box-shadow: 0 20px 60px var(--shadow-lg);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.3);
      margin-bottom: 16px;
    }

    .auth-logo-text {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .auth-logo-subtitle {
      font-size: 14px;
      color: var(--gray);
    }

    /* Title */
    .auth-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link:hover {
      text-decoration: underline;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--border);
      border-radius: 16px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--dark);
      cursor: pointer;
    }

    .remember-me input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .forgot-password {
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--gray);
      font-size: 14px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      padding: 0 16px;
    }

    /* Social Login */
    .social-login {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid var(--border);
      background: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .social-btn.google {
      background: white;
    }

    .social-btn.apple {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .social-btn.apple:hover {
      background: #1e293b;
      border-color: #1e293b;
      color: white;
    }

    /* Signup Link */
    .auth-signup {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
    }

    /* Error Message */
    .error-message {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.1) 100%);
      border: 2px solid var(--danger);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-icon {
      font-size: 20px;
      margin-right: 8px;
    }

    .error-text {
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-container {
        padding: 32px 24px;
      }

      .auth-title {
        font-size: 24px;
      }

      .social-login {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🏥</div>
      <div class="auth-logo-text">HealthAI</div>
      <div class="auth-logo-subtitle">Your Personal Health Companion</div>
    </div>

    <!-- Title -->
    <h1 class="auth-title">Welcome Back! 👋</h1>
    <p class="auth-subtitle">Enter your credentials to access your health dashboard</p>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage">
      <span class="error-icon">❌</span>
      <span class="error-text" id="errorText"></span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="Enter your email"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">
        <span>Sign In</span>
        <span>→</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">
      <span>Or continue with</span>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button class="social-btn google" onclick="handleGoogleLogin()">
        <span>🇬</span>
        <span>Google</span>
      </button>
      <button class="social-btn apple" onclick="handleAppleLogin()">
        <span>🍎</span>
        <span>Apple</span>
      </button>
    </div>

    <!-- Signup Link -->
    <p class="auth-signup">
      Don't have an account?
      <a href="signup.html" class="auth-link">Sign up</a>
    </p>
  </div>

  <script>
    // Check if user is already logged in
    function checkAuth() {
      const user = JSON.parse(localStorage.getItem('healthAIUser'));
      if (user && user.isAuthenticated) {
        window.location.href = 'index.html';
        return true;
      }
      return false;
    }

    // Check auth on page load
    if (checkAuth()) {
      // User is already logged in, redirecting
    } else {
      // Show login form
    }

    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // Basic validation
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      if (!isValidEmail(email)) {
        showError('Please enter a valid email address');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<div class="spinner"></div>';

      try {
        // Simulate API call (replace with actual API call)
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Get registered users from localStorage
        const users = JSON.parse(localStorage.getItem('healthAIUsers') || '[]');

        // Find user with matching email
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

        if (!user) {
          showError('No account found with this email. Please sign up.');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>Sign In</span><span>→</span>';
          return;
        }

        // Check password (in real app, use proper password hashing)
        if (user.password !== password) {
          showError('Incorrect password. Please try again.');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>Sign In</span><span>→</span>';
          return;
        }

        // Create user session
        const userSession = {
          id: user.id,
          email: user.email,
          firstName: user.firstName,
          lastName: user.lastName,
          isAuthenticated: true,
          loginTime: new Date().toISOString(),
          rememberMe: rememberMe
        };

        // Store user session
        localStorage.setItem('healthAIUser', JSON.stringify(userSession));

        // Update last login
        user.lastLogin = new Date().toISOString();
        localStorage.setItem('healthAIUsers', JSON.stringify(users));

        // Show success message
        loginBtn.innerHTML = '✓ Success!';
        loginBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);

      } catch (error) {
        console.error('Login error:', error);
        showError('An error occurred. Please try again.');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>Sign In</span><span>→</span>';
      }
    }

    // Handle Google login (placeholder)
    function handleGoogleLogin() {
      alert('🔑 Google login integration would be implemented here.\n\nThis requires Firebase Auth or Google OAuth setup.');
    }

    // Handle Apple login (placeholder)
    function handleAppleLogin() {
      alert('🍎 Apple login integration would be implemented here.\n\nThis requires Sign in with Apple setup.');
    }

    // Show forgot password
    function showForgotPassword() {
      alert('🔑 Password reset functionality would be implemented here.\n\nThis would send a password reset link to your email.');
    }

    // Show error message
    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      errorText.textContent = message;
      errorMessage.classList.add('show');

      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }

    // Validate email format
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    // Add demo account hint
    console.log('💡 Demo Account: john.doe@example.com / password123');
  </script>
</body>
</html>
