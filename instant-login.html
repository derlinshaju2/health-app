<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Health App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: #667eea; font-size: 28px; }
    .logo p { color: #666; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
    .signup-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .status-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    .status-message.error {
      background: #fee;
      color: #c33;
      display: block;
    }
    .status-message.success {
      background: #efe;
      color: #3c3;
      display: block;
    }
    .status-message.loading {
      background: #eef;
      color: #667eea;
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🏥 Health App</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="instant-signup.html">Sign up</a>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const statusMessage = document.getElementById('statusMessage');

    // Show instant loading message
    function showStatus(message, type) {
      statusMessage.className = 'status-message ' + type;
      statusMessage.textContent = message;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Instant UI feedback
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';
      showStatus('Connecting to server...', 'loading');

      try {
        // Simulate quick processing
        await new Promise(resolve => setTimeout(resolve, 800));

        // Get users from localStorage
        const users = JSON.parse(localStorage.getItem('healthAIUsers') || '[]');

        // Find user
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

        if (!user) {
          showStatus('❌ No account found with this email', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }

        // Check password
        if (user.password !== password) {
          showStatus('❌ Incorrect password', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }

        // Create user session
        const userSession = {
          id: user.id,
          email: user.email,
          firstName: user.firstName,
          lastName: user.lastName,
          isAuthenticated: true,
          loginTime: new Date().toISOString()
        };

        localStorage.setItem('healthAIUser', JSON.stringify(userSession));

        showStatus('✓ Success! Loading your dashboard...', 'success');

        // Instant redirect
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);

      } catch (error) {
        console.error('Login error:', error);
        showStatus('❌ ' + (error.message || 'Connection failed. Please try again.'), 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });

    // Check if already logged in
    const userSession = localStorage.getItem('healthAIUser');
    if (userSession) {
      const user = JSON.parse(userSession);
      if (user.isAuthenticated) {
        showStatus('✓ Already logged in! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      }
    }

    // Page loads instantly - no waiting
    console.log('✓ Login page loaded instantly!');
  </script>
</body>
</html>
