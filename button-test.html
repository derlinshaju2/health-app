<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #667eea; color: white; width: 100%; }
        button:hover { background: #764ba2; }
        .result { margin: 15px 0; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        h1 { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Button Test Page</h1>
        <p>This page tests if buttons work at all (no backend needed)</p>

        <h3>Test 1: Simple Alert</h3>
        <button onclick="test1()">Test 1: Click Me (Alert)</button>
        <div id="result1" class="result"></div>

        <h3>Test 2: Change Text</h3>
        <button onclick="test2()">Test 2: Click Me (Change Text)</button>
        <div id="result2" class="result"></div>

        <h3>Test 3: Toggle Visibility</h3>
        <button onclick="test3()">Test 3: Click Me (Toggle)</button>
        <div id="result3" class="result"></div>

        <h3>Test 4: API Call</h3>
        <button onclick="test4()">Test 4: API Health Check</button>
        <div id="result4" class="result"></div>

        <h3>Test 5: Full Registration Test</h3>
        <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;">
        <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin:5px 0;">
        <input type="text" id="name" placeholder="Name" style="width:100%;padding:10px;margin:5px 0;">
        <button onclick="test5()">Test 5: Register</button>
        <div id="result5" class="result"></div>

        <div style="margin-top:30px; padding:20px; background:#f9f9f9; border-radius:5px;">
            <h4>Console Output:</h4>
            <div id="console" style="background:#1e1e1e; color:#00ff00; padding:10px; border-radius:5px; font-family:monospace; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        function log(msg) {
            const console = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            console.innerHTML += '[' + time + '] ' + msg + '<br>';
            console.scrollTop = console.scrollHeight;
            window.console.log(msg);
        }

        function show(id, msg, type) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            el.className = 'result ' + type;
            el.textContent = msg;
        }

        function test1() {
            log('✅ Test 1: Button clicked!');
            alert('✅ SUCCESS: Buttons are working!');
            show('result1', '✅ Test 1 PASSED: JavaScript and buttons work!', 'success');
        }

        function test2() {
            log('✅ Test 2: Button clicked!');
            show('result2', '✅ Test 2 PASSED: Button changed this text!', 'success');
        }

        function test3() {
            log('✅ Test 3: Button clicked!');
            const el = document.getElementById('result3');
            if (el.style.display === 'none' || el.style.display === '') {
                el.style.display = 'block';
                el.className = 'result success';
                el.textContent = '✅ Test 3 PASSED: Visibility toggled!';
                log('✅ Made element visible');
            } else {
                el.style.display = 'none';
                log('✅ Hid element');
            }
        }

        async function test4() {
            log('🔄 Test 4: Testing API...');
            show('result4', 'Testing API connection...', 'error');

            try {
                log('Calling: /api/health');
                const res = await fetch('/api/health');
                log('Response status: ' + res.status);
                const data = await res.json();
                log('Response data: ' + JSON.stringify(data));

                if (data.status === 'success') {
                    show('result4', '✅ Test 4 PASSED: API is working! Database: ' + (data.database || 'Unknown'), 'success');
                } else {
                    show('result4', '⚠️ Test 4 WARNING: API responded but with issues: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                log('❌ Test 4 FAILED: ' + error.message);
                show('result4', '❌ Test 4 FAILED: ' + error.message + '\n\nThis means backend API is not working!', 'error');
            }
        }

        async function test5() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            if (!email || !password || !name) {
                show('result5', '❌ Please fill all fields', 'error');
                return;
            }

            log('🔄 Test 5: Testing registration...');
            show('result5', 'Testing registration...', 'error');

            try {
                log('Sending registration request...');
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        profile: { name: name }
                    })
                });

                log('Response status: ' + res.status);
                const data = await res.json();
                log('Response data: ' + JSON.stringify(data));

                if (data.status === 'success') {
                    show('result5', '🎉 Test 5 PASSED: Registration worked!\nUser: ' + data.data.user.email, 'success');
                    log('✅ Registration successful!');
                } else {
                    show('result5', '⚠️ Test 5: ' + data.message, 'error');
                    log('⚠️ Registration returned: ' + data.message);
                }
            } catch (error) {
                log('❌ Test 5 FAILED: ' + error.message);
                show('result5', '❌ Test 5 FAILED: ' + error.message, 'error');
            }
        }

        window.onload = function() {
            log('🚀 Page loaded successfully');
            log('📍 URL: ' + window.location.href);
            log('💡 Try clicking Test 1 first to confirm buttons work');
        };
    </script>
</body>
</html>
